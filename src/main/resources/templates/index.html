<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <title>Главная страница</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        h1 {
            margin-bottom: 1.5rem;
            color: #333;
        }
        .d-grid {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            width: 50%;
            max-width: 300px;
        }
        .btn {
            display: inline-block;
            font-size: 1.25rem;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.375rem;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            text-align: center;
            transition: opacity 0.3s ease;
        }
        .btn-primary {
            background-color: #0d6efd;
        }
        .btn-success {
            background-color: #198754;
        }
        .btn-primary:hover, .btn-success:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Добро пожаловать на главную страницу!</h1>
    <div class="d-grid">
        <a th:href="@{/user}" class="btn btn-primary">Перейти в личный кабинет</a>
        <a th:href="@{/login}" class="btn btn-success">Войти</a>
    </div>
</div>
</body>
</html>
