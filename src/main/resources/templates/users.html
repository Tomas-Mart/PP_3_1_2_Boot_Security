<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org" lang="ru">
<head>
    <title>Список пользователей</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            color: #333;
        }

        h1 {
            color: #444;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th, td {
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f8f9fa;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        a {
            color: #007bff;
            text-decoration: none;
            margin-right: 10px;
        }

        a:hover {
            text-decoration: underline;
        }

        button {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background-color: #c82333;
        }

        .add-user-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 15px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }

        .add-user-link:hover {
            background-color: #218838;
        }

        .no-users {
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
<h1>Список пользователей</h1>

<!-- Проверка на пустой список пользователей -->
<div th:if="${users == null or users.isEmpty()}" class="no-users">
    Пользователи отсутствуют.
</div>

<!-- Таблица пользователей -->
<table th:unless="${users == null or users.isEmpty()}">
    <thead>
    <tr>
        <th>Имя</th>
        <th>Email</th>
        <th>Возраст</th>
        <th>Роли</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.name}"></td>
        <td th:text="${user.email}"></td>
        <td th:text="${user.age}"></td>
        <td>
            <span th:each="role : ${user.roles}" th:text="${role.name} + ' '"></span>
        </td>
        <td>
            <a th:href="@{/users/details(id=${user.id})}">Детали</a>
            <a th:href="@{/users/edit(id=${user.id})}">Редактировать</a>
            <form th:action="@{/users/delete}" method="post" style="display: inline;" onsubmit="return confirm('Вы уверены, что хотите удалить этого пользователя?');">
                <input type="hidden" name="id" th:value="${user.id}">
                <!-- CSRF-токен, если включена защита -->
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit">Удалить</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<!-- Кнопка добавления пользователя -->
<a class="add-user-link" th:href="@{/users/add}">Добавить пользователя</a>
<form th:action="@{/logout}" method="post">
    <button type="submit">Выйти</button>
</form>
</div>
</body>
</html>
