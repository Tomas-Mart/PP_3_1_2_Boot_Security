<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="mb-4">Edit User</h1>
    <form th:action="@{/admin/users/edit}" method="post" class="mb-5">
        <input type="hidden" name="id" th:value="${user.id}">
        <div class="mb-3">
            <input type="text" name="name" th:value="${user.name}" placeholder="Name" class="form-control" required>
        </div>
        <div class="mb-3">
            <input type="email" name="email" th:value="${user.email}" placeholder="Email" class="form-control" required>
        </div>
        <div class="mb-3">
            <input type="number" name="age" th:value="${user.age}" placeholder="Age" class="form-control" required>
        </div>
        <div class="mb-3">
            <input type="password" name="password" placeholder="Password" class="form-control" required>
        </div>
        <div class="mb-3">
            <select name="role" class="form-select" required>
                <option th:each="role : ${user.roles}" th:value="${role.name}" th:text="${role.name}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
    <a th:href="@{/admin/users}" class="btn btn-secondary">Back to Users</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
