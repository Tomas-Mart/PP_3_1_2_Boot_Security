<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Edit User</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 80%;
            margin: 2rem auto;
        }
        h1 {
            color: #343a40;
            margin-bottom: 1.5rem;
        }
        form {
            margin-bottom: 3rem;
        }
        .form-control, .form-select {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid #ced4da;
            border-radius: 0.25rem;
        }
        .btn {
            display: inline-block;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            border-radius: 0.25rem;
            text-decoration: none;
            color: #fff;
            cursor: pointer;
        }
        .btn-primary {
            background-color: #0d6efd;
        }
        .btn-secondary {
            background-color: #6c757d;
        }
        .btn:hover {
            opacity: 0.9;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #495057;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Edit User</h1>
    <form th:action="@{/admin/users/edit}" method="post">
        <input type="hidden" name="id" th:value="${user.id}">
        <div>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" th:value="${user.name}" placeholder="Name" class="form-control" required>
        </div>
        <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" th:value="${user.email}" placeholder="Email" class="form-control" required>
        </div>
        <div>
            <label for="age">Age</label>
            <input type="number" id="age" name="age" th:value="${user.age}" placeholder="Age" class="form-control" required>
        </div>
        <div>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Password" class="form-control" required>
        </div>
        <div>
            <label for="role">Role</label>
            <select id="role" name="role" class="form-select" required>
                <option th:each="role : ${user.roles}" th:value="${role.name}" th:text="${role.name}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
    <a th:href="@{/admin/users}" class="btn btn-secondary">Back to Users</a>
    <form th:action="@{/logout}" method="post">
        <button type="submit">Выйти</button>
    </form>
</div>
</body>
</html>
