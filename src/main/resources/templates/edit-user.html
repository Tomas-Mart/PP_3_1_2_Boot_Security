<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <title>Редактирование пользователя</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        h1 {
            color: #333;
            margin-bottom: 1.5rem;
        }
        .card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            margin-bottom: 1.5rem;
        }
        .form-control, .form-select {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 1rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            color: #fff;
            background-color: #0d6efd;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .btn:hover {
            background-color: #0b5ed7;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Редактирование пользователя</h1>
    <div class="card">
        <form th:action="@{/admin/users/edit}" method="post">
            <input type="hidden" name="id" th:value="${user.id}">
            <div>
                <label for="name">Имя</label>
                <input type="text" id="name" name="name" th:value="${user.name}" placeholder="Имя" class="form-control" required>
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" th:value="${user.email}" placeholder="Email" class="form-control" required>
            </div>
            <div>
                <label for="age">Возраст</label>
                <input type="number" id="age" name="age" th:value="${user.age}" placeholder="Возраст" class="form-control" required>
            </div>
            <div>
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Пароль" class="form-control" required>
            </div>
            <div>
                <label for="role">Роль</label>
                <select id="role" name="role" class="form-select" required>
                    <option th:each="role : ${user.roles}" th:value="${role.name}" th:text="${role.name}"></option>
                </select>
            </div>
            <button type="submit" class="btn">Сохранить изменения</button>
        </form>
    </div>
    <a th:href="@{/admin/users}" class="btn btn-secondary">Назад к списку пользователей</a>
</div>
</body>
</html>
