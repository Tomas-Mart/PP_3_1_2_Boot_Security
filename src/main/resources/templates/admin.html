<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <title>Панель администратора</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 80%;
            margin: 2rem auto;
        }
        h1, h2 {
            color: #343a40;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            border: 1px solid #dee2e6;
            padding: 0.75rem;
            text-align: left;
        }
        th {
            background-color: #f1f3f5;
        }
        tr:nth-child(even) {
            background-color: #f8f9fa;
        }
        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            font-size: 1rem;
            border-radius: 0.25rem;
            text-decoration: none;
            color: #fff;
            cursor: pointer;
            margin: 0.5rem 0;
            width: 220px;
            text-align: center;
        }
        .btn-primary {
            background-color: #0d6efd;
        }
        .btn-danger {
            background-color: #dc3545;
        }
        .btn-success {
            background-color: #198754;
        }
        .btn-warning {
            background-color: #ffc107;
            color: #000;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .form-control, .form-select {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid #ced4da;
            border-radius: 0.25rem;
        }
        .mb-3 {
            margin-bottom: 1rem;
        }
        .mt-5 {
            margin-top: 3rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #495057;
        }
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="mb-4">Панель администратора</h1>

    <!-- Список пользователей -->
    <h2>Список пользователей</h2>
    <table>
        <thead>
        <tr>
            <th>Имя</th>
            <th>Email</th>
            <th>Возраст</th>
            <th>Роли</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.name}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.age}"></td>
            <td th:text="${user.roles}"></td>
            <td>
                <a th:href="@{/admin/users/edit(id=${user.id})}" class="btn btn-warning">Редактировать</a>
                <form th:action="@{/admin/users/delete}" method="post" style="display: inline;">
                    <input type="hidden" name="id" th:value="${user.id}">
                    <button type="submit" class="btn btn-danger">Удалить</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Форма добавления нового пользователя -->
    <h2 class="mt-5">Добавить нового пользователя</h2>
    <form th:action="@{/admin/users}" method="post" class="mb-5">
        <div class="mb-3">
            <label for="name">Имя</label>
            <input type="text" id="name" name="name" placeholder="Имя" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Email" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="age">Возраст</label>
            <input type="number" id="age" name="age" placeholder="Возраст" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" placeholder="Пароль" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="role">Роль</label>
            <select id="role" name="role" class="form-select" required>
                <option value="ROLE_USER">Пользователь</option>
                <option value="ROLE_ADMIN">Администратор</option>
            </select>
        </div>
        <button type="submit" class="btn btn-success">Добавить пользователя</button>
    </form>

    <!-- Кнопка выхода -->
    <div class="button-container">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-primary">Выйти</button>
        </form>
    </div>
</div>
</body>
</html>
